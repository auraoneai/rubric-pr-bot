<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuraOne Rubric PR Bot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070a;
        --panel: #0c1017;
        --line: rgba(220, 232, 255, 0.15);
        --text: #f5f8ff;
        --muted: #9ba8ba;
        --cyan: #3dd6d0;
        --green: #46d08b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: linear-gradient(180deg, rgba(10, 14, 20, 0.98), var(--bg));
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(12, 16, 23, 0.9);
        padding: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--cyan);
        font-size: 12px;
        font-weight: 750;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
        line-height: 1.12;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      code {
        color: var(--green);
        font-family: "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">AuraOne Open Source</p>
      <h1>Rubric PR Bot</h1>
      <p>The GitHub App webhook endpoint is available at <code>/webhook</code>.</p>
    </main>
  </body>
</html>
